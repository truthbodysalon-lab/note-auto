name: note daily generate

# 毎日 JST 5:00 (=UTC 20:00) に記事を生成してリポジトリに保存。
# 投稿はMac側が git pull して行う（noteがクラウドからの投稿をブロックするため）。
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 整体記事を生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARTICLE_DIR: articles/seitai
        run: python generate_seitai.py

      - name: マーケ記事を生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARTICLE_DIR: articles/consul
        run: python generate_consul.py

      - name: 生成した記事をリポジトリに保存
        run: |
          git config user.name "note-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "generate: $(date -u +%F)" || echo "変更なし"
          git push || echo "push skip"
